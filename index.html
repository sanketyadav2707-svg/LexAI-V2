<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexAI — Executive Intelligence</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', sans-serif; background-color: #000000; color: #ffffff; }
    .sidebar { background-color: #0a0a0a; border-right: 1px solid #1f1f1f; }
    .btn-new-chat { border: 1px solid #2e2e2e; transition: background 0.2s; }
    .btn-new-chat:hover { background-color: #1a1a1a; }
    .history-item { color: #a1a1a1; transition: color 0.2s; }
    .history-item:hover { color: #ffffff; background-color: #141414; }
    .input-container { background-color: #0f0f0f; border: 1px solid #2e2e2e; }
    .chat-bubble-user { background-color: #171717; border: 1px solid #262626; color: #ffffff; }
    .chat-bubble-ai { color: #e5e5e5; line-height: 1.7; }
    .thinking-tag { background: #1a1a1a; border: 1px solid #333; color: #888; font-size: 11px; }
    
    /* Custom Password Eye Button */
    .pw-wrapper { position: relative; }
    .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #666; cursor: pointer; }

    /* Hide scrollbars */
    ::-webkit-scrollbar { width: 0px; }
    textarea { scrollbar-width: none; }
</style>
</head>
<body class="h-full flex">

<!-- ── SIDEBAR ── -->
<aside class="sidebar w-64 flex flex-col h-full hidden md:flex">
    <div class="p-4">
        <button onclick="startNewChat()" class="btn-new-chat w-full py-2 rounded-md text-sm font-medium flex items-center justify-center gap-2">
            <span>+</span> New Chat
        </button>
    </div>

    <!-- History -->
    <div class="flex-1 overflow-y-auto px-4 space-y-1" id="chat-history">
        <!-- JS Populated -->
    </div>

    <!-- Bottom Options -->
    <div class="p-4 border-t border-zinc-800 space-y-1">
        <button class="history-item w-full text-left p-2 rounded text-sm flex items-center gap-3">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
            Settings
        </button>
        <button class="history-item w-full text-left p-2 rounded text-sm flex items-center gap-3">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            Profile
        </button>
        <button onclick="handleSignout()" class="history-item w-full text-left p-2 rounded text-sm flex items-center gap-3 text-red-900">
            Sign Out
        </button>
    </div>
</aside>

<!-- ── MAIN CONTENT ── -->
<main class="flex-1 flex flex-col h-full relative">
    
    <!-- Chat Display -->
    <div id="chat-container" class="flex-1 overflow-y-auto px-6">
        <div id="welcome-view" class="h-full flex flex-col items-center justify-center text-center">
            <h1 class="text-3xl font-light text-zinc-200 mb-2">Hi <span id="user-name-span">Counselor</span>,</h1>
            <h2 class="text-3xl font-medium text-white">How can I help you today?</h2>
        </div>
        <div id="messages" class="max-w-3xl mx-auto py-10 space-y-8 hidden">
            <!-- Messages injected here -->
        </div>
    </div>

    <!-- ── INPUT AREA ── -->
    <div class="p-6">
        <div class="max-w-3xl mx-auto">
            <div class="input-container rounded-2xl p-3 shadow-2xl">
                <textarea id="user-input" rows="1" placeholder="Message LexAI..." class="w-full bg-transparent border-none outline-none text-white text-sm resize-none py-2 px-2"></textarea>
                
                <div class="flex items-center justify-between mt-2 pt-2 border-t border-zinc-800">
                    <div class="flex items-center gap-4">
                        <!-- File Upload -->
                        <label class="cursor-pointer text-zinc-500 hover:text-zinc-300">
                            <input type="file" class="hidden">
                            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                        </label>

                        <!-- Thinking Toggle -->
                        <div class="flex items-center gap-2 bg-zinc-900 rounded-full px-3 py-1">
                            <span class="text-[10px] uppercase font-bold text-zinc-500">Deep Thinking</span>
                            <button id="deep-thinking-toggle" onclick="toggleDeepThinking()" class="w-8 h-4 bg-zinc-700 rounded-full relative transition-colors">
                                <div id="toggle-dot" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full transition-transform"></div>
                            </button>
                        </div>
                    </div>

                    <button id="send-btn" onclick="handleSend()" class="bg-white text-black px-4 py-1.5 rounded-full text-xs font-bold hover:bg-zinc-200 transition-colors">
                        Send
                    </button>
                </div>
            </div>
            <p class="text-[10px] text-zinc-600 text-center mt-3">LexAI can make mistakes. Verify important information.</p>
        </div>
    </div>
</main>

<!-- ── AUTH OVERLAY (BLACK) ── -->
<div id="auth-screen" class="fixed inset-0 z-50 bg-black flex items-center justify-center p-6">
    <div class="w-full max-w-sm space-y-8">
        <div class="text-center">
            <h1 class="text-2xl font-bold tracking-tighter italic">LexAI</h1>
        </div>
        
        <div class="space-y-4">
            <div id="auth-name-container" class="hidden">
                <input id="auth-name" type="text" placeholder="Full Name" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-sm outline-none focus:border-white">
            </div>
            <input id="auth-email" type="email" placeholder="Email" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-sm outline-none focus:border-white">
            
            <div class="pw-wrapper">
                <input id="auth-pass" type="password" placeholder="Password" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-sm outline-none focus:border-white">
                <span class="pw-toggle" onclick="togglePasswordVisibility()">
                    <svg id="eye-icon" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                </span>
            </div>

            <button onclick="handleAuthSubmit()" id="auth-submit-btn" class="w-full bg-white text-black font-bold py-3 rounded-lg text-sm">Continue</button>
            
            <p class="text-center text-xs text-zinc-500">
                <span id="auth-toggle-text">Don't have an account?</span> 
                <button onclick="toggleAuthMode()" class="text-white underline" id="auth-toggle-link">Sign Up</button>
            </p>
        </div>
    </div>
</div>

<script src="chat.js"></script>
</body>
</html>
