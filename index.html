<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexAI | Your Executive Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #090909; color: #E5E5E5; overflow: hidden; }
        .sidebar { background: #0D0D0D; border-right: 1px solid #1F1F1F; }
        .chat-container { background: radial-gradient(circle at top, #111 0%, #090909 100%); }
        
        /* Glassmorphism for AI bubbles */
        .ai-bubble { 
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.5rem;
            line-height: 1.7;
        }
        
        .user-bubble { 
            background: #1A1A1A; 
            border-radius: 1.2rem;
            border: 1px solid #2A2A2A;
        }

        .input-area {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid #2A2A2A;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        /* The Typing Cursor */
        .typing-cursor::after { content: '|'; animation: blink 0.8s infinite; color: #60A5FA; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Auth Screen */
        .auth-card { background: #111; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .active-tab { border-bottom: 2px solid #FFF; color: #FFF; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex">

<!-- ── SIDEBAR ── -->
<aside class="sidebar w-72 flex flex-col h-full border-r border-zinc-900 hidden lg:flex">
    <div class="p-5">
        <button onclick="startNewChat()" class="w-full py-2.5 rounded-xl border border-zinc-800 hover:bg-zinc-900 transition-all text-sm font-semibold flex items-center justify-center gap-2">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            New Session
        </button>
    </div>

    <div class="flex-1 overflow-y-auto px-4" id="history-list">
        <p class="text-[10px] uppercase tracking-widest text-zinc-600 font-bold mb-3 px-2">History</p>
        <!-- History items -->
    </div>

    <div class="p-5 border-t border-zinc-900 space-y-2">
        <button class="w-full flex items-center gap-3 text-sm text-zinc-400 hover:text-white transition-colors p-2 rounded-lg">
            <svg width="18" height="18" fill="none" stroke="currentColor"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            Settings
        </button>
        <button onclick="handleSignout()" class="w-full flex items-center gap-3 text-sm text-red-500 hover:bg-red-500/10 transition-all p-2 rounded-lg">
            Sign Out
        </button>
    </div>
</aside>

<!-- ── MAIN CONTENT ── -->
<main class="flex-1 flex flex-col chat-container">
    <div id="welcome-screen" class="flex-1 flex flex-col items-center justify-center text-center px-6">
        <h1 class="text-4xl font-bold text-white mb-2">Good Day, <span id="user-display-name">Counselor</span>.</h1>
        <p class="text-zinc-500 text-lg max-w-xl">I'm Lex. Whether it's a complex legal hurdle or just a personal thought, I'm here to listen and solve.</p>
    </div>

    <div id="chat-messages" class="flex-1 overflow-y-auto px-6 py-10 space-y-8 hidden">
        <!-- Messages stream here -->
    </div>

    <!-- COMMAND CENTER -->
    <div class="p-6">
        <div class="max-w-4xl mx-auto input-area rounded-3xl p-4">
            <textarea id="user-query" rows="1" oninput="autoResize(this)" placeholder="Ask anything..." class="w-full bg-transparent border-none outline-none text-white text-base py-2 px-3 resize-none"></textarea>
            
            <div class="flex items-center justify-between mt-4">
                <div class="flex items-center gap-4">
                   <!-- Trigger function on click -->
<button onclick="triggerFileUpload()" class="p-2 text-zinc-500 hover:text-white transition-colors" title="Attach Files">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
</button>

<!-- Hidden File Input -->
<input type="file" id="hidden-file-input" class="hidden" onchange="handleFileSelect(event)">
                    
                    <div class="flex items-center gap-2 bg-zinc-900 rounded-full px-3 py-1.5 border border-zinc-800">
                        <span class="text-[10px] font-bold text-zinc-500">DEEP THINKING</span>
                        <input type="checkbox" id="think-toggle" class="w-4 h-4 accent-white">
                    </div>
                </div>

                <button id="send-btn" onclick="processMessage()" class="bg-white text-black h-10 px-6 rounded-full font-bold hover:scale-105 transition-all">
                    Send
                </button>
            </div>
        </div>
    </div>
</main>

<!-- ── AUTH MODULE (SIGNUP/LOGIN) ── -->
<div id="auth-screen" class="fixed inset-0 z-50 bg-[#050505] flex items-center justify-center p-6">
    <div class="auth-card w-full max-w-md rounded-3xl p-10">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-white">LexAI</h2>
            <div class="flex justify-center gap-8 mt-6">
                <button onclick="setAuthMode('login')" id="login-tab" class="active-tab py-1 text-sm font-semibold">Login</button>
                <button onclick="setAuthMode('signup')" id="signup-tab" class="py-1 text-sm font-semibold text-zinc-500">Sign Up</button>
            </div>
        </div>

        <div class="space-y-4">
            <div id="signup-fields" class="hidden animate-in">
                <input id="auth-name" type="text" placeholder="Your Name" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3.5 text-sm outline-none focus:border-zinc-500">
            </div>
            <input id="auth-email" type="email" placeholder="Email Address" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3.5 text-sm outline-none focus:border-zinc-500">
            <div class="relative">
                <input id="auth-pass" type="password" placeholder="Password" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3.5 text-sm outline-none focus:border-zinc-500">
                <button onclick="togglePass()" class="absolute right-4 top-3.5 text-zinc-500">👁️</button>
            </div>
            <button onclick="submitAuth()" class="w-full bg-white text-black font-bold py-4 rounded-xl mt-4 hover:bg-zinc-200">Continue</button>
        </div>
    </div>
</div>

<script src="chat.js"></script>
</body>
</html>
