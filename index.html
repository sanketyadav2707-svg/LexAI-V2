<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LexAI | Executive Intelligence</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { 
            brand: '#3b82f6', 
            sidebar: '#0a0b0d',
            appbg: '#111216',
            inputbg: '#1c1e24',
            border: '#2a2e38'
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --bg-main: #111216;
      --bg-sidebar: #0a0b0d;
      --bg-input: #1c1e24;
      --border-color: #2a2e38;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --hover-bg: rgba(255,255,255,0.03);
    }
    html.light {
      --bg-main: #f8fafc;
      --bg-sidebar: #f1f5f9;
      --bg-input: #ffffff;
      --border-color: #e2e8f0;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --hover-bg: rgba(0,0,0,0.03);
    }
    body { background-color: var(--bg-main); color: var(--text-main); font-feature-settings: "ss01", "ss03", "cv01"; overscroll-behavior-y: none; }
    
    /* Scrollbar fixes */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.3); }

    /* Bubbles */
    .user-bubble { background-color: var(--bg-input); color: var(--text-main); border-radius: 18px 18px 0px 18px; border: 1px solid var(--border-color); }
    .ai-bubble { background-color: transparent; color: var(--text-main); border-radius: 0px 18px 18px 18px; }
    
    /* Animations */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .anim-fade-up { animation: fadeUp 0.35s ease-out forwards; }
    
    /* Staging Area for Uploads */
    #file-staging-area {
        display: none;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 16px;
        border-top: 1px solid var(--border-color);
        background-color: var(--bg-input);
        margin-top: -1px; /* Overlap input top border */
    }

    /* THE UPDATE: Table Styling & Advanced Markdown Pointers */
    #chat-messages table { width: 100%; margin-top: 1rem; margin-bottom: 1rem; border-collapse: collapse; overflow-x: auto; display: block; }
    #chat-messages th { background-color: var(--hover-bg); color: var(--text-main); font-weight: 600; text-align: left; padding: 12px; border: 1px solid var(--border-color); }
    #chat-messages td { padding: 10px; border: 1px solid var(--border-color); text-align: left; color: var(--text-main); }
    #chat-messages pre { background-color: rgba(0,0,0,0.1); padding: 1rem; border-radius: 8px; font-family: monospace; overflow-x: auto; font-size: 0.85rem; border: 1px solid var(--border-color); }
    #chat-messages code { color: #f87171; background-color: rgba(0,0,0,0.1); padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 0.9rem; }
    #chat-messages pre code { color: inherit; background-color: transparent; padding: 0; }
    
    /* Re-enabling standard list styles for Marked.js */
    #chat-messages ul { list-style-type: disc !important; margin-left: 1.5rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
    #chat-messages ol { list-style-type: decimal !important; margin-left: 1.5rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
    #chat-messages li { margin-bottom: 0.25rem; }

    /* Button interactions */
    .btn-press:active { transform: scale(0.97); }
    
    /* UI Element Overwrites */
    .chat-container-max { max-width: 800px; margin-left: auto; margin-right: auto; }
  </style>
</head>
<body class="font-sans antialiased text-sm">

  <div class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="w-[280px] h-full flex flex-col shrink-0 bg-sidebar border-r border-border -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out z-40 fixed md:relative">
      <div class="h-16 flex items-center justify-between px-4 border-b border-border shrink-0">
        <div class="flex items-center gap-2.5">
          <svg class="w-6 h-6 text-brand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
          <span class="font-bold text-lg tracking-tight">LexAI</span>
        </div>
        <button onclick="toggleSidebar()" class="md:hidden text-muted p-1 hover:text-main"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg></button>
      </div>
      <div class="p-3 shrink-0"><button onclick="SessionManager.createNew()" class="btn-press w-full p-2.5 bg-brand text-white font-semibold rounded-xl flex items-center justify-center gap-2 hover:bg-blue-600 transition-colors text-sm shadow-sm"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> New Session</button></div>
      <nav id="history-list" class="flex-grow overflow-y-auto px-3 py-2 space-y-1.5 scrollbar-thin"><p class="text-[10px] uppercase tracking-widest text-muted font-bold mb-3 px-2">Recents</p></nav>
      <div id="sidebar-footer" class="p-3 border-t border-border mt-auto shrink-0"></div>
    </aside>

    <main class="flex-grow h-full flex flex-col bg-appbg relative">
      <header class="h-16 flex items-center justify-between px-4 md:px-6 border-b border-border bg-appbg shrink-0 z-30">
        <button onclick="toggleSidebar()" class="md:hidden text-muted p-1.5 hover:text-main rounded-lg"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
        <div class="flex items-center gap-2 md:hidden">
          <svg class="w-5 h-5 text-brand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
          <span class="font-bold">Lex</span>
        </div>
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-2 text-xs text-muted border border-border px-3 py-1.5 rounded-full bg-inputbg"><div class="w-2 h-2 rounded-full bg-emerald-500"></div> All Systems Operational</div>
        </div>
      </header>
      
      <div id="chat-messages" class="flex-grow overflow-y-auto p-4 md:p-8 space-y-8 scrollbar-thin pb-36 hidden relative"></div>
      
      <div id="welcome-screen" class="flex-grow flex flex-col items-center justify-center p-6 md:p-10 text-center relative z-10 anim-fade-up">
        <div id="welcome-text-container" class="anim-fade-up anim-delay-1"></div>
      </div>

      <div class="absolute bottom-0 left-0 right-0 p-4 md:p-6 z-30">
        <div class="chat-container-max relative shadow-xl rounded-2xl bg-inputbg border border-border">
          
          <div id="file-staging-area"></div>
          
          <div class="flex items-center gap-2 p-3 pr-4">
            <input type="file" id="hidden-file-input" multiple class="hidden" onchange="handleFileSelect(event)">
            <button onclick="triggerFileUpload()" class="p-3 text-muted hover:text-main rounded-xl transition-colors hover:bg-hover-bg"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg></button>
            <textarea id="user-query" rows="1" oninput="autoResize(this)" onkeydown="handleInputKeydown(event)" placeholder="Ask Lex anything..." class="flex-grow bg-transparent text-main placeholder-muted text-base focus:outline-none resize-none px-1 scrollbar-none max-h-48"></textarea>
            <div class="flex items-center gap-2">
                <label class="flex items-center gap-2 text-xs text-muted cursor-pointer hover:text-main p-2 rounded-lg"><input type="checkbox" id="think-toggle" class="accent-brand"> Advanced Mode</label>
                <button onclick="processMessage()" class="btn-press p-3 bg-brand text-white rounded-xl hover:bg-blue-600 transition-colors shadow flex items-center justify-center shrink-0"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" class="transform rotate-90"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="global-context-menu" class="hidden fixed w-44 bg-inputbg border border-border rounded-xl shadow-2xl z-50 text-sm overflow-hidden py-1"></div>
  <div id="settings-modal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-6 backdrop-blur-sm opacity-0 transition-opacity duration-300" onclick="toggleSettings()">
    <div id="settings-card" class="w-full max-w-md bg-inputbg border border-border rounded-2xl shadow-2xl p-6 scale-95 transition-transform duration-300" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-6 pb-4 border-b border-border"><h3 class="font-bold text-lg">Lex Settings</h3><button onclick="toggleSettings()" class="text-muted hover:text-main"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
      <div class="space-y-6">
        <div class="flex items-center justify-between gap-4 p-4 border border-border rounded-xl bg-hover-bg"><div><p class="font-semibold text-main">Display Mode</p><p class="text-xs text-muted">Switch between dark and light themes</p></div><button id="theme-btn" onclick="toggleTheme()" class="btn-press text-xs px-4 py-2 bg-brand text-white font-semibold rounded-full hover:bg-blue-600 transition">Light Mode</button></div>
        <div class="flex items-center justify-between gap-4 p-4 border border-border rounded-xl bg-red-500/10 border-red-500/20"><div><p class="font-semibold text-red-500">Delete History</p><p class="text-xs text-muted">Permanently erase all chat history</p></div><button onclick="clearAllData()" class="btn-press text-xs px-4 py-2 bg-red-500 text-white font-semibold rounded-full hover:bg-red-600 transition">Delete</button></div>
      </div>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
