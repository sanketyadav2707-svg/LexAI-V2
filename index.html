<!-- Replace your entire index.html with this -->
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LexAI — Master Orchestrator 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        navy: { 950:'#020817', 900:'#0a1628', 800:'#0f2040', 700:'#162a52', 600:'#1e3a6e', 500:'#2563a8' },
        gold: { 400:'#f0c040', 500:'#d4a843', 600:'#b8902a', 700:'#9a7820' },
      },
      fontFamily: { sans:['Inter','sans-serif'], serif:['Cormorant Garamond','serif'] },
    }
  }
}
</script>
<style>
  body{font-family:'Inter',sans-serif;background:#020817;color:#e2e8f0;overflow:hidden;height:100vh;}
  .navy-glow{background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(37,99,168,0.15),transparent);}
  
  /* 2026 UI Components */
  .execution-plan { border: 1px solid rgba(212,168,67,0.2); background: rgba(10,22,40,0.6); backdrop-filter: blur(10px); }
  .citation-card { display: flex; align-items: center; gap: 8px; background: rgba(30,58,110,0.3); border: 1px solid rgba(30,58,110,0.5); padding: 8px 12px; border-radius: 8px; font-size: 11px; color: #93c5fd; transition: all 0.2s; }
  .citation-card:hover { background: rgba(37,99,168,0.4); border-color: #d4a843; }
  .action-module { background: linear-gradient(135deg, rgba(37,99,168,0.2), rgba(2,8,23,0.8)); border: 1px solid rgba(37,99,168,0.4); border-radius: 12px; padding: 16px; margin-top: 15px; }
  
  .agent-step{transition:all 0.4s ease;border:1px solid #1e3a6e;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .agent-step.active{border-color:#d4a843;background:rgba(212,168,67,0.05);}
  .agent-step.done{border-color:#22c55e;background:rgba(34,197,94,0.05);}
  .check-icon{color:#22c55e;font-size:16px;}
  .pending-dot{width:8px;height:8px;border-radius:50%;background:#d4a843;animation:pulse 1.5s ease infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
  
  .chat-bubble.ai{background:rgba(15,32,64,0.4); border:1px solid rgba(30,58,110,0.3); border-radius:16px 16px 16px 4px; padding:18px;}
  .chat-bubble.user{background:linear-gradient(135deg,#162a52,#0f2040); border:1px solid #1e3a6e; border-radius:16px 16px 4px 16px; padding:12px 16px; margin-left:auto;}
  
  .skeleton{background:linear-gradient(90deg,#0f2040 25%,#162a52 50%,#0f2040 75%);background-size:700px 100%;animation:shimmer 1.8s linear infinite;}
  @keyframes shimmer{0%{background-position:-700px 0}100%{background-position:700px 0}}
  
  .sidebar-item.active{background:rgba(37,99,168,0.18);color:#f0c040;border-color:rgba(37,99,168,0.3);}
  .tab-btn.active{background:#162a52;color:#f0c040;}
  .msg-appear{animation:fadeIn 0.3s ease forwards;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body class="h-full flex flex-col">

<!-- ═══ AUTH SCREEN ═══ -->
<div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center navy-glow" style="background-color:#020817;">
  <div class="w-full max-w-md px-6">
    <div class="text-center mb-8">
      <h1 class="font-serif text-4xl font-bold text-white tracking-tight">LexAI</h1>
      <p class="text-gold-500 text-xs tracking-widest uppercase mt-2">Master Orchestrator 2026</p>
    </div>

    <div class="bg-navy-900 border border-navy-700 rounded-2xl p-8 shadow-2xl">
      <div class="flex bg-navy-950 rounded-lg p-1 mb-6 gap-1">
        <button id="tab-signin" onclick="switchAuthTab('signin')" class="flex-1 py-2 rounded text-xs active">Sign In</button>
        <button id="tab-signup" onclick="switchAuthTab('signup')" class="flex-1 py-2 rounded text-xs text-slate-500">Sign Up</button>
      </div>

      <div class="space-y-4">
        <div id="name-row" class="hidden">
          <input id="auth-name" type="text" placeholder="Full name" class="w-full bg-navy-950 border border-navy-700 rounded-lg p-3 text-sm">
        </div>
        <input id="auth-email" type="email" placeholder="Email address" class="w-full bg-navy-950 border border-navy-700 rounded-lg p-3 text-sm">
        <input id="auth-pass" type="password" placeholder="Password" class="w-full bg-navy-950 border border-navy-700 rounded-lg p-3 text-sm">
        <div id="confirm-row" class="hidden">
          <input id="auth-confirm" type="password" placeholder="Confirm password" class="w-full bg-navy-950 border border-navy-700 rounded-lg p-3 text-sm">
        </div>
        <div id="auth-error" class="hidden text-red-400 text-xs text-center p-2 bg-red-900/10 border border-red-900/30 rounded"></div>
        <button onclick="handleAuth()" class="w-full bg-gold-600 hover:bg-gold-500 text-navy-950 font-bold py-3 rounded-lg transition-all">Enter Workspace →</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ SPLASH SCREEN ═══ -->
<div id="splash-screen" class="fixed inset-0 z-40 hidden flex flex-col items-center justify-center" style="background:#020817;">
  <div class="text-center">
    <div class="h-16 w-16 bg-navy-800 rounded-2xl border border-gold-500/30 mx-auto mb-6 flex items-center justify-center">
        <div class="pending-dot"></div>
    </div>
    <h1 class="font-serif text-3xl font-bold text-white mb-2">LexAI</h1>
    <p id="splash-status" class="text-slate-500 text-xs">Initializing Master Orchestrator...</p>
    <div class="mt-6 w-48 h-1 bg-navy-900 rounded-full overflow-hidden mx-auto">
        <div id="splash-bar" class="h-full bg-gold-500 transition-all duration-1000" style="width: 0%"></div>
    </div>
  </div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="app-screen" class="hidden h-screen flex flex-row overflow-hidden" style="background:#020817;">
  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 flex-shrink-0 flex flex-col border-r border-navy-700 bg-navy-900">
    <div class="p-4 border-b border-navy-700 flex items-center gap-3">
        <span class="font-serif font-bold text-gold-500 text-xl">LexAI</span>
    </div>
    <div class="p-3">
        <button onclick="startNewChat()" class="w-full py-2 bg-navy-800 border border-gold-500/30 text-gold-500 rounded-lg text-xs font-bold">+ New Legal Query</button>
    </div>
    <div class="flex-1 overflow-y-auto px-3" id="chat-history-list"></div>
    <div class="p-4 border-t border-navy-700">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-8 h-8 rounded bg-gold-600 text-navy-950 flex items-center justify-center font-bold" id="user-avatar">U</div>
            <div class="text-xs truncate font-medium text-white" id="user-name-display">Counselor</div>
        </div>
        <button onclick="handleSignout()" class="w-full py-2 text-xs text-slate-500 hover:text-white border border-slate-800 rounded">Sign Out</button>
    </div>
  </aside>

  <!-- Workspace -->
  <main class="flex-1 flex flex-col overflow-hidden relative">
    <header class="flex items-center px-6 py-4 border-b border-navy-700 bg-navy-900/50">
        <div class="flex-1">
            <h2 id="current-session-title" class="text-sm font-bold text-white">New Intelligence Query</h2>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Status: Multi-Agent Ready</p>
        </div>
        <div class="flex gap-2">
            <button id="mode-standard" onclick="setMode('standard')" class="px-3 py-1 text-[10px] rounded bg-navy-700 text-gold-500 border border-gold-500/30">Standard</button>
            <button id="mode-research" onclick="setMode('research')" class="px-3 py-1 text-[10px] rounded text-slate-500 border border-navy-700">Deep Research</button>
        </div>
    </header>

    <div id="messages-area" class="flex-1 overflow-y-auto p-6">
        <div id="messages-container" class="max-w-4xl mx-auto space-y-6">
            <!-- Welcome -->
            <div id="welcome-state" class="text-center py-20">
                <h1 class="text-3xl font-serif text-white mb-4">Welcome back, <span id="welcome-name">Counselor</span></h1>
                <p class="text-slate-500 text-sm mb-12">Select a protocol to begin analysis.</p>
                <div class="grid grid-cols-2 gap-4 max-w-2xl mx-auto">
                    <div onclick="sendQuickPrompt('Analyze the risk exposure in this NDA')" class="p-6 bg-navy-900/50 border border-navy-700 rounded-xl hover:border-gold-500/50 cursor-pointer transition-all">
                        <div class="text-gold-500 mb-2">📄</div>
                        <div class="text-sm font-bold text-white">Risk Exposure</div>
                    </div>
                    <div onclick="sendQuickPrompt('M&A Due Diligence Checklist for SaaS')" class="p-6 bg-navy-900/50 border border-navy-700 rounded-xl hover:border-gold-500/50 cursor-pointer transition-all">
                        <div class="text-gold-500 mb-2">🏢</div>
                        <div class="text-sm font-bold text-white">M&A Protocol</div>
                    </div>
                </div>
            </div>
        </div>
        <div id="skeleton-loader" class="hidden max-w-4xl mx-auto mt-6">
            <div class="flex gap-4">
                <div class="w-8 h-8 rounded bg-navy-800 skeleton"></div>
                <div class="flex-1 space-y-3">
                    <div class="h-3 bg-navy-800 skeleton rounded w-3/4"></div>
                    <div class="h-3 bg-navy-800 skeleton rounded w-full"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Input -->
    <div class="p-6 bg-navy-950 border-t border-navy-700">
        <div class="max-w-4xl mx-auto relative">
            <textarea id="user-input" oninput="autoResizeTextarea(this)" onkeydown="handleInputKeydown(event)" placeholder="Ask the Master Orchestrator..." class="w-full bg-navy-900 border border-navy-700 rounded-xl p-4 pr-24 text-sm text-white focus:border-gold-500 transition-all outline-none resize-none" rows="1"></textarea>
            <button onclick="sendMessage()" id="send-btn" class="absolute right-3 bottom-3 bg-gold-600 text-navy-950 px-4 py-2 rounded-lg text-xs font-bold hover:bg-gold-500">Send</button>
        </div>
    </div>
  </main>
</div>

<script src="chat.js"></script>
</body>
</html>
