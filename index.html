<!-- ── AUTH MODULE (SIGNUP/LOGIN) ── -->
<div id="auth-screen" class="fixed inset-0 z-50 bg-[#050505] flex items-center justify-center p-6">
    <div class="auth-card w-full max-w-md rounded-3xl p-10 bg-[#111] border border-zinc-800 shadow-2xl">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-white tracking-tighter italic">LexAI</h2>
            <div class="flex justify-center gap-8 mt-6">
                <!-- TABS -->
                <button onclick="setAuthMode('login')" id="login-tab" class="active-tab py-1 text-sm font-semibold border-b-2 border-white text-white">Login</button>
                <button onclick="setAuthMode('signup')" id="signup-tab" class="py-1 text-sm font-semibold text-zinc-500 border-b-2 border-transparent">Sign Up</button>
            </div>
        </div>

        <div class="space-y-4">
            <!-- Name field only shows during Signup -->
            <div id="signup-fields" class="hidden">
                <input id="auth-name" type="text" placeholder="Your Name" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3.5 text-sm text-white outline-none focus:border-zinc-500">
            </div>
            
            <input id="auth-email" type="email" placeholder="Email Address" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3.5 text-sm text-white outline-none focus:border-zinc-500">
            
            <div class="relative">
                <input id="auth-pass" type="password" placeholder="Password" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3.5 text-sm text-white outline-none focus:border-zinc-500">
                <!-- Eye Button -->
                <button onclick="togglePass()" class="absolute right-4 top-3.5 text-zinc-500 hover:text-white transition-colors">👁️</button>
            </div>

            <button onclick="submitAuth()" class="w-full bg-white text-black font-bold py-4 rounded-xl mt-4 hover:bg-zinc-200 transition-transform active:scale-95">
                Continue
            </button>
        </div>
    </div>
</div>
